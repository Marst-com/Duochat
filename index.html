  function catWhiskers() {
    return `
    <path d="M6 42 L20 40M6 48 L20 46" stroke="#B9BAD6" stroke-width="1.6" stroke-linecap="round" opacity="0.8"/>
    <path d="M74 42 L60 40M74 48 L60 46" stroke="#B9BAD6" stroke-width="1.6" stroke-linecap="round" opacity="0.8"/>`;
  }

  function stickerFace(s, eyeShape) {
    return `
    ${catEars(s)}
    <circle cx="40" cy="42" r="30" fill="url(#g-${s.id})" stroke="#E3E5F0" stroke-width="1.2"/>
    ${catWhiskers()}
    ${eyeShape}
    <path d="M40 45 l-3 4 h6 z" fill="#FFD3E4"/>
    <path d="${s.mouth}" stroke="#5A5C72" stroke-width="2.6" fill="none" stroke-linecap="round"/>`;
  }

  function stickerAccessory(type) {
    switch (type) {
      case 'wave': return '<path d="M60 22 l6 -4 4 6 -8 10" stroke="#5A5C72" stroke-width="2.5" fill="#F6F7FB" stroke-linejoin="round"/>';
      case 'heart': return '<path d="M40 12c-3-5-11-4-11 2 0 5 11 12 11 12s11-7 11-12c0-6-8-7-11-2z" fill="#FF6F59"/>';
      case 'lol': return '<path d="M16 36c4-2 6 2 4 5" stroke="#5A5C72" stroke-width="2" fill="none" stroke-linecap="round"/><path d="M64 36c-4-2-6 2-4 5" stroke="#5A5C72" stroke-width="2" fill="none" stroke-linecap="round"/>';
      case 'tear': return '<path d="M26 38c-1 5 2 8 2 8" stroke="#2EC4B6" stroke-width="3" fill="none" stroke-linecap="round"/>';
      case 'angry': return '<path d="M24 28l10 4M56 28l-10 4" stroke="#E3483F" stroke-width="3" stroke-linecap="round"/>';
      case 'star': return '<path d="M62 12l2 5 5 1-4 3 1 5-4-3-4 3 1-5-4-3 5-1z" fill="#FFC94A"/>';
      case 'party': return '<path d="M12 14l4 4M16 10l0 6M8 18l6 0" stroke="#2EC4B6" stroke-width="2.5" stroke-linecap="round"/><path d="M64 14l4 4M68 10l0 6M60 18l6 0" stroke="#FF6F59" stroke-width="2.5" stroke-linecap="round"/>';
      case 'zzz': return '<text x="56" y="16" font-size="14" font-family="Arial" fill="#8A8CA3" font-weight="700">Z</text>';
      default: return '';
    }
  }

  function stickerSvg(s) {
    const eyes = s.accessory === 'sleepy'
      ? '<path d="M29 38 Q33 41 37 38" stroke="#3A3B4D" stroke-width="2.4" fill="none" stroke-linecap="round"/><path d="M43 38 Q47 41 51 38" stroke="#3A3B4D" stroke-width="2.4" fill="none" stroke-linecap="round"/>'
      : `<ellipse cx="32" cy="38" rx="3" ry="4" fill="#3A3B4D"/><ellipse cx="48" cy="38" rx="3" ry="4" fill="#3A3B4D"/>
         <circle cx="33" cy="36.5" r="1" fill="#fff"/><circle cx="49" cy="36.5" r="1" fill="#fff"/>`;
    return `<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="g-${s.id}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#EDEEF5"/>
      </linearGradient></defs>
      ${stickerFace(s, eyes)}
      ${stickerAccessory(s.accessory)}
    </svg>`;
  }

  function stickerSvgById(id) {
    const s = STICKERS.find(x => x.id === id);
    return s ? stickerSvg(s) : '';
  }

  let stickerPanelBuilt = false;
  let stickerActiveTab = 'emoji';

  function buildStickerPanel() {
    stickerPanel.innerHTML = `
      <div class="sticker-tabs">
        <button type="button" data-stab="emoji" class="active">이모지</button>
        <button type="button" data-stab="sticker">스티커</button>
      </div>
      <div id="emoji-grid" class="emoji-grid"></div>
      <div id="duo-sticker-grid" class="duo-sticker-grid" style="display:none;"></div>
    `;
    const emojiGrid = stickerPanel.querySelector('#emoji-grid');
    QUICK_EMOJIS.forEach((em) => {
      const b = document.createElement('button');
      b.type = 'button';
      b.textContent = em;
      b.addEventListener('click', () => {
        msgInput.value += em;
        msgInput.focus();
      });
      emojiGrid.appendChild(b);
    });

    const stickerGrid = stickerPanel.querySelector('#duo-sticker-grid');
    STICKERS.forEach((s) => {
      const b = document.createElement('button');
      b.type = 'button';
      b.title = s.label;
      b.innerHTML = stickerSvg(s);
      b.addEventListener('click', () => sendSticker(s.id));
      stickerGrid.appendChild(b);
    });

    stickerPanel.querySelectorAll('.sticker-tabs button').forEach((btn) => {
      btn.addEventListener('click', () => {
        stickerActiveTab = btn.dataset.stab;
        stickerPanel.querySelectorAll('.sticker-tabs button').forEach(b => b.classList.toggle('active', b === btn));
        emojiGrid.style.display = stickerActiveTab === 'emoji' ? 'grid' : 'none';
        stickerGrid.style.display = stickerActiveTab === 'sticker' ? 'grid' : 'none';
      });
    });
    stickerPanelBuilt = true;
  }

  emojiToggleBtn.addEventListener('click', () => {
    if (!stickerPanelBuilt) buildStickerPanel();
    stickerPanel.style.display = stickerPanel.style.display === 'none' ? 'block' : 'none';
  });

  async function sendSticker(stickerId) {
    if (!currentUser || !activeRoomId) return;
    stopTyping();
    try {
      await addDoc(collection(db, 'rooms', activeRoomId, 'messages'), {
        type: 'sticker', stickerId, text: '',
        uid: currentUser.uid,
        displayName: myProfile.nickname || currentUser.displayName || '익명',
        photoURL: currentUser.photoURL || '',
        createdAt: serverTimestamp()
      });
      await updateDoc(doc(db, 'rooms', activeRoomId), {
        lastMessage: '(스티커)',
        lastMessageAt: serverTimestamp()
      });
    } catch (err) { console.error(err); }
    stickerPanel.style.display = 'none';
  }

  /* =========================================================
     이미지 전송 (Firebase Storage)
     경로: rooms/{roomId}/images/{uid}_{timestamp}_{filename}
     ========================================================= */
  const MAX_IMAGE_MB = 8;

  imageBtn.addEventListener('click', () => {
    if (!activeRoomId) return;
    imageFileInput.click();
  });

  imageFileInput.addEventListener('change', async () => {
    const file = imageFileInput.files[0];
    imageFileInput.value = '';
    if (!file || !activeRoomId || !currentUser) return;
    if (!file.type.startsWith('image/')) { alert('이미지 파일만 보낼 수 있어요.'); return; }
    if (file.size > MAX_IMAGE_MB * 1024 * 1024) { alert(`이미지는 ${MAX_IMAGE_MB}MB 이하만 보낼 수 있어요.`); return; }
    await uploadAndSendImage(file);
  });

  function showUploadProgressRow(show) {
    let row = document.getElementById('upload-progress-row');
    if (show) {
      if (!row) {
        row = document.createElement('div');
        row.id = 'upload-progress-row';
        row.className = 'upload-progress-row';
        row.innerHTML = '<span class="spinner"></span><span>사진 업로드 중…</span>';
        messagesEl.parentNode.insertBefore(row, messagesEl.nextSibling);
      }
    } else if (row) {
      row.remove();
    }
  }

  function loadImageFromFile(file) {
    return new Promise((resolve, reject) => {
      const fr = new FileReader();
      fr.onload = () => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = fr.result;
      };
      fr.onerror = reject;
      fr.readAsDataURL(file);
    });
  }

  // Firestore 문서 용량 제한(1MB) 안에 들어가도록 리사이즈 + 압축해서 data URL로 변환
  async function compressImageToDataUrl(file, maxDim = 1280, maxBytes = 650000) {
    const img = await loadImageFromFile(file);
    let width = img.width, height = img.height;
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    let dataUrl = '';
    for (let attempt = 0; attempt < 6; attempt++) {
      const scale = Math.min(1, maxDim / Math.max(width, height));
      const w = Math.max(1, Math.round(width * scale));
      const h = Math.max(1, Math.round(height * scale));
      canvas.width = w; canvas.height = h;
      ctx.clearRect(0, 0, w, h);
      ctx.drawImage(img, 0, 0, w, h);

      let quality = 0.85;
      dataUrl = canvas.toDataURL('image/jpeg', quality);
      while (dataUrl.length * 0.75 > maxBytes && quality > 0.35) {
        quality -= 0.15;
        dataUrl = canvas.toDataURL('image/jpeg', quality);
      }
      if (dataUrl.length * 0.75 <= maxBytes) break;
      maxDim = Math.round(maxDim * 0.7); // 그래도 크면 한번 더 축소해서 재시도
    }
    return dataUrl;
  }

  async function uploadAndSendImage(file) {
    const roomId = activeRoomId;
    imageBtn.disabled = true;
    showUploadProgressRow(true);
    try {
      const dataUrl = await compressImageToDataUrl(file);
      if (dataUrl.length * 0.75 > 900000) {
        alert('이미지 용량이 너무 커서 압축 후에도 보낼 수 없어요. 더 작은 사진을 시도해주세요.');
        return;
      }

      await addDoc(collection(db, 'rooms', roomId, 'messages'), {
        type: 'image', imageData: dataUrl, text: '',
        uid: currentUser.uid,
        displayName: myProfile.nickname || currentUser.displayName || '익명',
        photoURL: currentUser.photoURL || '',
        createdAt: serverTimestamp()
      });
      await updateDoc(doc(db, 'rooms', roomId), {
        lastMessage: '(사진)',
        lastMessageAt: serverTimestamp()
      });
    } catch (err) {
      console.error(err);
      alert('이미지 전송에 실패했어요.');
    } finally {
      imageBtn.disabled = false;
      showUploadProgressRow(false);
    }
  }

  function openLightbox(url) {
    if (!url) return;
    lightboxImg.src = url;
    imageLightbox.classList.add('show');
  }
  imageLightbox.addEventListener('click', () => {
    imageLightbox.classList.remove('show');
    lightboxImg.src = '';
  });


  /* =========================================================
     WebRTC 다인 음성통화 (Firestore 시그널링, mesh 구조)
     - rooms/{roomId}/activeCall/session  : { active, startedAt }
     - rooms/{roomId}/activeCall/session/participants/{uid} : { displayName, photoURL, joinedAt }
     - rooms/{roomId}/activeCall/session/peers/{pairKey} : { offer, answer, fromUid, toUid }
         .../offerCandidates/*  .../answerCandidates/*
     - uid가 더 작은 쪽이 offer(발신), 더 큰 쪽이 answer(수신) 역할을 맡아
       모든 참가자가 서로 1:1 연결을 맺는 mesh 방식으로 그룹 통화를 구성합니다.
     ========================================================= */
  const rtcConfig = {
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' }
    ]
  };

  let inCall = false;
  let callRoomId = null;
  let localStream = null;
  const peerConnections = {};   // uid -> RTCPeerConnection
  const peerUnsubs = {};        // uid -> [unsub, unsub, ...]
  let unsubParticipants = null;
  let unsubActiveCallDoc = null;
  let callTimerInterval = null;
  let callStartedAt = null;
  let knownParticipants = {};   // uid -> {displayName, photoURL}

  function pairKey(a, b) { return [a, b].sort().join('__'); }
  function callSessionRef(roomId) { return doc(db, 'rooms', roomId, 'activeCall', 'session'); }
  function participantsCol(roomId) { return collection(db, 'rooms', roomId, 'activeCall', 'session', 'participants'); }
  function peersCol(roomId) { return collection(db, 'rooms', roomId, 'activeCall', 'session', 'peers'); }

  // 방을 열 때마다 해당 방의 통화 세션 상태를 구독 (수신 배너 표시용)
  const _openRoom = openRoom;
  openRoom = function (roomId) {
    _openRoom(roomId);
    if (unsubActiveCallDoc) { unsubActiveCallDoc(); unsubActiveCallDoc = null; }
    unsubActiveCallDoc = onSnapshot(callSessionRef(roomId), async (snap) => {
      const data = snap.data();
      if (!data || !data.active) {
        callBanner.classList.remove('show');
        return;
      }
      if (inCall && callRoomId === roomId) { callBanner.classList.remove('show'); return; }
      // 이미 참가 중이 아니면 배너로 알림
      const partsSnap = await getDocs(participantsCol(roomId));
      if (partsSnap.empty) { callBanner.classList.remove('show'); return; }
      const names = [];
      partsSnap.forEach(d => names.push(d.data().displayName || '누군가'));
      callBannerName.textContent = names.length <= 2 ? names.join(', ') : `${names[0]} 외 ${names.length - 1}명`;
      callBanner.dataset.roomId = roomId;
      callBanner.classList.add('show');
    });
  };
  const _closeRoom = closeRoom;
  closeRoom = function () {
    if (unsubActiveCallDoc) { unsubActiveCallDoc(); unsubActiveCallDoc = null; }
    callBanner.classList.remove('show');
    _closeRoom();
  };

  callStartBtn.addEventListener('click', async () => {
    if (!activeRoomId) return;
    if (inCall) { alert('이미 통화에 참여 중이에요.'); return; }
    await joinCall(activeRoomId);
  });

  callAcceptBtn.addEventListener('click', async () => {
    const roomId = callBanner.dataset.roomId;
    callBanner.classList.remove('show');
    if (!roomId) return;
    if (roomId !== activeRoomId) openRoom(roomId);
    await joinCall(roomId);
  });

  callDeclineBtn.addEventListener('click', () => {
    callBanner.classList.remove('show');
  });

  callHangupBtn.addEventListener('click', () => leaveCall());

  async function getMic() {
    try {
      return await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    } catch (err) {
      alert('마이크 권한이 필요합니다.');
      throw err;
    }
  }

  async function joinCall(roomId) {
    try { localStream = await getMic(); } catch { return; }

    inCall = true;
    callRoomId = roomId;
    callBanner.classList.remove('show');

    // 세션이 없으면 생성
    await setDoc(callSessionRef(roomId), { active: true, startedAt: serverTimestamp() }, { merge: true });
    // 내 참가자 문서 등록
    await setDoc(doc(participantsCol(roomId), currentUser.uid), {
      displayName: myProfile.nickname || currentUser.displayName || '익명',
      photoURL: currentUser.photoURL || '',
      joinedAt: serverTimestamp()
    });

    callStartedAt = Date.now();
    startCallTimerUI();

    // 참가자 목록 구독 -> 새로운 참가자와 mesh 연결 생성/해제
    unsubParticipants = onSnapshot(participantsCol(roomId), (snap) => {
      const nowIds = new Set();
      snap.forEach((d) => {
        const uid = d.id;
        nowIds.add(uid);
        knownParticipants[uid] = d.data();
        if (uid === currentUser.uid) return;
        if (!peerConnections[uid]) {
          connectToPeer(roomId, uid);
        }
      });
      // 나간 참가자 정리
      Object.keys(peerConnections).forEach((uid) => {
        if (!nowIds.has(uid)) disconnectPeer(uid);
      });
      renderCallParticipants(snap);
    });
  }

  function renderCallParticipants(snap) {
    callParticipantsEl.innerHTML = '';
    let count = 0;
    snap.forEach((d) => {
      count++;
      const data = d.data();
      const av = document.createElement('div');
      av.className = 'p-avatar';
      av.title = data.displayName || '';
      av.textContent = (data.displayName || '?').trim().charAt(0).toUpperCase();
      callParticipantsEl.appendChild(av);
    });
    callActiveName.textContent = count <= 1 ? '통화 중 (나만 참여)' : `통화 중 · ${count}명`;
  }

  async function connectToPeer(roomId, otherUid) {
    const pc = new RTCPeerConnection(rtcConfig);
    peerConnections[otherUid] = pc;
    peerUnsubs[otherUid] = [];

    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
    pc.ontrack = (e) => {
      let audioEl = document.getElementById('audio-' + otherUid);
      if (!audioEl) {
        audioEl = document.createElement('audio');
        audioEl.id = 'audio-' + otherUid;
        audioEl.autoplay = true;
        audioEl.setAttribute('playsinline', '');
        remoteAudiosContainer.appendChild(audioEl);
      }
      audioEl.srcObject = e.streams[0];
    };

    const key = pairKey(currentUser.uid, otherUid);
    const pairRef = doc(peersCol(roomId), key);
    const iAmOfferer = currentUser.uid < otherUid;

    if (iAmOfferer) {
      pc.onicecandidate = (e) => {
        if (e.candidate) addDoc(collection(pairRef, 'offerCandidates'), e.candidate.toJSON());
      };
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      await setDoc(pairRef, {
        fromUid: currentUser.uid, toUid: otherUid,
        offer: { type: offer.type, sdp: offer.sdp },
        answer: null, createdAt: serverTimestamp()
      });

      const unsub1 = onSnapshot(pairRef, async (snap) => {
        const data = snap.data();
        if (data && data.answer && pc.signalingState !== 'closed' && !pc.currentRemoteDescription) {
          await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
        }
      });
      const unsub2 = onSnapshot(collection(pairRef, 'answerCandidates'), (snap) => {
        snap.docChanges().forEach((change) => {
          if (change.type === 'added') pc.addIceCandidate(new RTCIceCandidate(change.doc.data())).catch(() => {});
        });
      });
      peerUnsubs[otherUid].push(unsub1, unsub2);
    } else {
      pc.onicecandidate = (e) => {
        if (e.candidate) addDoc(collection(pairRef, 'answerCandidates'), e.candidate.toJSON());
      };

      const unsub1 = onSnapshot(pairRef, async (snap) => {
        const data = snap.data();
        if (!data || !data.offer) return;
        if (!pc.currentRemoteDescription) {
          await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          await updateDoc(pairRef, { answer: { type: answer.type, sdp: answer.sdp } });
        }
      });
      const unsub2 = onSnapshot(collection(pairRef, 'offerCandidates'), (snap) => {
        snap.docChanges().forEach((change) => {
          if (change.type === 'added') pc.addIceCandidate(new RTCIceCandidate(change.doc.data())).catch(() => {});
        });
      });
      peerUnsubs[otherUid].push(unsub1, unsub2);
    }
  }

  function disconnectPeer(uid) {
    const pc = peerConnections[uid];
    if (pc) { pc.close(); delete peerConnections[uid]; }
    (peerUnsubs[uid] || []).forEach(u => u());
    delete peerUnsubs[uid];
    const audioEl = document.getElementById('audio-' + uid);
    if (audioEl) { audioEl.srcObject = null; audioEl.remove(); }
  }

  function startCallTimerUI() {
    callActiveBar.classList.add('show');
    if (callTimerInterval) clearInterval(callTimerInterval);
    callTimerInterval = setInterval(() => {
      const sec = Math.floor((Date.now() - callStartedAt) / 1000);
      const m = String(Math.floor(sec / 60)).padStart(2, '0');
      const s = String(sec % 60).padStart(2, '0');
      callTimer.textContent = `${m}:${s}`;
    }, 500);
  }

  async function leaveCall() {
    const roomId = callRoomId;
    Object.keys(peerConnections).forEach(disconnectPeer);
    if (unsubParticipants) { unsubParticipants(); unsubParticipants = null; }
    if (callTimerInterval) { clearInterval(callTimerInterval); callTimerInterval = null; }
    if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
    remoteAudiosContainer.innerHTML = '';
    callActiveBar.classList.remove('show');
    callTimer.textContent = '00:00';
    inCall = false;

    if (roomId && currentUser) {
      try {
        await deleteDoc(doc(participantsCol(roomId), currentUser.uid));
        // 내가 관련된 pair 문서 + ICE candidate 서브컬렉션까지 함께 정리
        const mySessionPeers = await getDocs(peersCol(roomId));
        for (const d of mySessionPeers.docs) {
          const data = d.data();
          if (data.fromUid !== currentUser.uid && data.toUid !== currentUser.uid) continue;
          const [offC, ansC] = await Promise.all([
            getDocs(collection(d.ref, 'offerCandidates')),
            getDocs(collection(d.ref, 'answerCandidates'))
          ]);
          const batch = writeBatch(db);
          offC.forEach(c => batch.delete(c.ref));
          ansC.forEach(c => batch.delete(c.ref));
          batch.delete(d.ref);
          await batch.commit();
        }
        const remaining = await getDocs(participantsCol(roomId));
        if (remaining.empty) {
          await updateDoc(callSessionRef(roomId), { active: false }).catch(() => {});
        }
      } catch (e) { /* noop */ }
    }
    callRoomId = null;
  }

  function teardownCall() {
    if (inCall) leaveCall();
    if (unsubParticipants) { unsubParticipants(); unsubParticipants = null; }
    if (unsubActiveCallDoc) { unsubActiveCallDoc(); unsubActiveCallDoc = null; }
  }

  // 탭을 그냥 닫아도 최대한 참가자 목록에서 빠지도록 시도 (완벽한 보장은 아님)
  window.addEventListener('pagehide', () => {
    if (inCall && callRoomId && currentUser) {
      deleteDoc(doc(participantsCol(callRoomId), currentUser.uid)).catch(() => {});
    }
  });
</script>
</body>

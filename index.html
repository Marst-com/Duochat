
<!DOCTYPE html>
<html lang="ko">
<head>
<script>
  try {
    var t = localStorage.getItem('duochat-theme');
    if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
  } catch (e) {}
</script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>Duochat</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 34 34'%3E%3Ccircle cx='14' cy='17' r='12' fill='%232EC4B6'/%3E%3Ccircle cx='22' cy='14' r='10' fill='%23FF6F59' fill-opacity='0.92'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 34 34'%3E%3Ccircle cx='14' cy='17' r='12' fill='%232EC4B6'/%3E%3Ccircle cx='22' cy='14' r='10' fill='%23FF6F59' fill-opacity='0.92'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1B1B2F;
    --paper:#F6F7FB;
    --paper-2:#ffffff;
    --coral:#FF6F59;
    --coral-soft:#FFE4DF;
    --teal:#2EC4B6;
    --teal-soft:#DDF6F2;
    --line:#E4E5EE;
    --muted:#8A8CA3;
    --danger:#E3483F;
    --chip-dark:#1B1B2F;
    --font-display:'Space Grotesk', sans-serif;
    --font-body:'Inter', sans-serif;
    --font-mono:'JetBrains Mono', monospace;
  }
  html[data-theme="dark"]{
    --ink:#F1F2FA;
    --paper:#15161F;
    --paper-2:#1E1F2C;
    --coral:#FF8874;
    --coral-soft:#3A2622;
    --teal:#3FD9C9;
    --teal-soft:#123734;
    --line:#2E3040;
    --muted:#9698B5;
    --danger:#FF7A70;
  }
  html[data-theme="dark"] body{background:var(--paper);}
  html[data-theme="dark"] #login-screen::before{background:var(--paper);}
  html[data-theme="dark"] .login-card,
  html[data-theme="dark"] .modal-card{box-shadow:0 24px 60px -20px rgba(0,0,0,0.6);}
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:var(--font-body);
    color:var(--ink);
    background:var(--paper);
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer;}
  input,textarea{font-family:inherit;}

  /* ---------- Logo mark ---------- */
  .mark{display:inline-flex;align-items:center;gap:10px;}
  .mark svg{display:block;}
  .mark .wordmark{
    font-family:var(--font-display);
    font-weight:700;
    font-size:20px;
    letter-spacing:-0.02em;
  }

  /* ---------- Login screen ---------- */
  #login-screen{
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    background:linear-gradient(135deg, var(--teal) 0%, var(--teal) 48%, var(--paper) 48%, var(--paper) 52%, var(--coral) 52%, var(--coral) 100%);
  }
  #login-screen::before{content:"";position:absolute;inset:0;background:var(--paper);opacity:0.94;}
  .login-card{
    position:relative; z-index:1;
    width:min(380px, 88vw);
    background:var(--paper-2);
    border-radius:20px;
    padding:44px 36px 36px;
    box-shadow:0 24px 60px -20px rgba(27,27,47,0.25);
    text-align:center;
    border:1px solid var(--line);
  }
  .login-card .mark{flex-direction:column;justify-content:center;gap:14px;margin-bottom:24px;}
  .login-card h1{font-family:var(--font-display);font-size:22px;margin:0 0 8px;letter-spacing:-0.01em;}
  .login-card p{color:var(--muted);font-size:14px;line-height:1.6;margin:0 0 30px;}
  .google-btn{
    width:100%; display:flex; align-items:center; justify-content:center; gap:10px;
    padding:13px 18px; border-radius:12px; border:1px solid var(--line);
    background:var(--paper-2); font-weight:600; font-size:14px; color:var(--ink);
    transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
  }
  .google-btn:hover{border-color:var(--ink);transform:translateY(-1px);box-shadow:0 8px 20px -10px rgba(27,27,47,0.35);}
  .google-btn:active{transform:translateY(0);}
  .login-foot{margin-top:22px;font-family:var(--font-mono);font-size:11px;color:var(--muted);letter-spacing:0.02em;}
  #login-error{margin-top:16px;font-size:12.5px;color:var(--coral);display:none;}

  /* ---------- App shell ---------- */
  #app-screen{display:none;height:100dvh;}
  .shell{
    display:flex;
    height:100%;
  }

  /* ----- Sidebar (room list) ----- */
  .sidebar{
    width:320px;
    flex:0 0 320px;
    display:flex;
    flex-direction:column;
    background:var(--paper-2);
    border-right:1px solid var(--line);
  }
  .sidebar-brand{
    display:flex;align-items:center;gap:8px;
    padding:14px 18px 10px;
  }
  .sidebar-brand span{
    font-family:var(--font-display);font-weight:700;font-size:15px;letter-spacing:-0.01em;
  }
  .sidebar-top{
    padding:16px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:1px solid var(--line);
    position:relative;
  }
  .sidebar-top::after{
    content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;
    background:linear-gradient(90deg, var(--teal), var(--coral));
  }
  .icon-btn{
    width:34px;height:34px;border-radius:10px;border:1px solid var(--line);
    background:var(--paper); color:var(--ink);
    display:flex;align-items:center;justify-content:center;
    transition:all .15s ease;
  }
  .icon-btn:hover{border-color:var(--coral);color:var(--coral);}
  .my-mini{display:flex;align-items:center;gap:8px;}
  .my-mini img{width:30px;height:30px;border-radius:50%;box-shadow:0 0 0 1px var(--line);}
  .my-mini .name{font-size:12.5px;font-weight:600;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .signout-mini{background:none;border:none;color:var(--muted);font-size:11px;padding:2px;}
  .signout-mini:hover{color:var(--danger);}

  #room-list{
    flex:1;
    overflow-y:auto;
    padding:8px;
  }
  #room-list .empty{
    margin-top:60px;
    text-align:center;
    color:var(--muted);
    font-size:13px;
    line-height:1.7;
    padding:0 20px;
  }
  .room-item{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px 10px;
    border-radius:14px;
    cursor:pointer;
    position:relative;
    transition:background .12s ease;
  }
  .room-item:hover{background:var(--paper);}
  .room-item.active{background:var(--teal-soft);}
  .room-avatar{
    width:44px;height:44px;border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-display);font-weight:700;font-size:16px;color:#fff;
    background:linear-gradient(135deg, var(--teal), var(--coral));
    flex:0 0 auto;
  }
  .room-info{flex:1;min-width:0;}
  .room-name-row{display:flex;align-items:baseline;justify-content:space-between;gap:6px;}
  .room-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .room-time{font-family:var(--font-mono);font-size:10px;color:var(--muted);flex:0 0 auto;}
  .room-last{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
  .room-del{
    position:absolute; right:8px; top:8px;
    width:22px;height:22px;border-radius:7px;
    display:none; align-items:center; justify-content:center;
    background:var(--paper-2); border:1px solid var(--line); color:var(--muted);
  }
  .room-item:hover .room-del{display:flex;}
  .room-del:hover{color:#fff;background:var(--danger);border-color:var(--danger);}

  /* ----- Sidebar collapsed (친구/모먼트 탭일 때 얇은 레일로) ----- */
  .sidebar.collapsed{width:84px; flex:0 0 84px;}
  .sidebar.collapsed .sidebar-brand span{display:none;}
  .sidebar.collapsed .sidebar-brand{justify-content:center;}
  .sidebar.collapsed .sidebar-top{display:none;}
  .sidebar.collapsed .tab-bar{flex-direction:column;}
  .sidebar.collapsed #room-list{display:none;}

  /* ----- Tabs ----- */
  .tab-bar{
    display:flex; gap:4px; padding:8px 12px; border-bottom:1px solid var(--line);
  }
  .tab-btn{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
    padding:8px 4px; border:none; background:transparent; border-radius:10px;
    color:var(--muted); font-size:10.5px; font-weight:600; transition:all .12s ease;
  }
  .tab-btn:hover{background:var(--paper);}
  .tab-btn.active{color:var(--coral); background:var(--coral-soft);}
  .tab-panel{flex:1; overflow-y:auto; padding:8px;}

  /* ----- Friends ----- */
  .friend-search{display:flex; gap:6px; padding:6px 8px 10px;}
  .friend-search input{
    flex:1; border:1px solid var(--line); background:var(--paper); border-radius:10px;
    padding:9px 12px; font-size:13px; outline:none;
  }
  .friend-search input:focus{border-color:var(--teal);}
  .friend-list-title{font-size:11.5px; font-weight:700; color:var(--muted); padding:10px 10px 4px;}
  .friend-item{
    display:flex; align-items:center; gap:10px; padding:10px; border-radius:12px;
  }
  .friend-item:hover{background:var(--paper);}
  .friend-item .room-avatar{width:38px;height:38px;font-size:14px;border-radius:50%;}
  .friend-item .f-name{flex:1; font-size:13.5px; font-weight:600; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .friend-item .f-btn{
    font-size:11.5px; font-weight:600; padding:6px 10px; border-radius:9px; border:1px solid var(--line);
    background:var(--paper-2); color:var(--ink);
  }
  .friend-item .f-btn:hover{border-color:var(--coral); color:var(--coral);}
  .friend-item .f-btn.chat-btn{background:var(--teal); color:#fff; border-color:var(--teal);}
  .friend-item .f-btn.chat-btn:hover{background:#26a99d;}

  .friends-view-body{
    flex:1; overflow-y:auto; padding:24px 28px;
    max-width:640px; width:100%; margin:0 auto;
  }
  .friends-view-body .friend-search{padding:0 0 18px;}
  .friends-view-body .friend-list-title{padding:16px 4px 8px; font-size:12.5px;}
  .friends-view-body .friend-item{
    padding:14px 12px; border:1px solid var(--line); border-radius:14px; margin-bottom:8px;
  }
  .friends-view-body .friend-item .room-avatar{width:44px; height:44px; font-size:16px; cursor:pointer;}
  .friends-view-body .friend-item .f-name{font-size:14.5px; cursor:pointer;}

  /* ----- Moments ----- */
  .moment-composer{
    display:flex; flex-direction:column; gap:8px; background:var(--paper-2);
    border:1px solid var(--line); border-radius:16px; padding:14px;
  }
  .moment-composer textarea{
    resize:none; border:none; outline:none; font-family:inherit; font-size:14px;
    min-height:60px; background:transparent; color:var(--ink);
  }
  .moment-card{
    background:var(--paper-2); border:1px solid var(--line); border-radius:16px; padding:16px;
    max-width:520px;
  }
  .moment-card .m-head{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
  .moment-card .m-head img{width:34px;height:34px;border-radius:50%;}
  .moment-card .m-name{font-size:13.5px; font-weight:700;}
  .moment-card .m-time{font-size:11px; color:var(--muted); font-family:var(--font-mono);}
  .moment-card .m-text{font-size:14px; line-height:1.6; white-space:pre-wrap;}
  .moment-card .m-del{margin-left:auto; color:var(--muted); background:none; border:none; font-size:11px;}
  .moment-card .m-del:hover{color:var(--danger);}

  /* ----- Emoji / sticker picker ----- */
  #sticker-panel{
    border-top:1px solid var(--line); background:var(--paper-2);
    max-height:230px; overflow-y:auto; padding:12px 16px;
  }
  .sticker-tabs{display:flex; gap:8px; margin-bottom:10px;}
  .sticker-tabs button{
    font-size:12px; font-weight:600; padding:6px 12px; border-radius:20px;
    border:1px solid var(--line); background:var(--paper); color:var(--muted);
  }
  .sticker-tabs button.active{background:var(--chip-dark); color:#fff; border-color:var(--chip-dark);}
  .emoji-grid{display:grid; grid-template-columns:repeat(8, 1fr); gap:4px;}
  .emoji-grid button{
    font-size:20px; padding:6px; border:none; background:none; border-radius:8px; line-height:1;
  }
  .emoji-grid button:hover{background:var(--paper);}
  .duo-sticker-grid{display:grid; grid-template-columns:repeat(4, 1fr); gap:10px;}
  .duo-sticker-grid button{
    border:1px solid var(--line); border-radius:14px; background:var(--paper); padding:8px;
  }
  .duo-sticker-grid button:hover{border-color:var(--coral);}
  .duo-sticker-grid svg{width:100%; height:auto; display:block;}
  .msg-row .bubble.sticker-bubble{
    background:transparent !important; padding:0 !important; width:96px;
  }
  .msg-row .bubble.big-emoji{
    background:transparent !important; padding:0 !important; font-size:48px; line-height:1;
  }
  .msg-row .bubble.image-bubble{
    background:transparent !important; padding:0 !important;
    max-width:240px; border-radius:14px; overflow:hidden; line-height:0; cursor:pointer;
  }
  .msg-row .bubble.image-bubble img{
    display:block; width:100%; max-height:320px; object-fit:cover; border-radius:14px;
  }
  .upload-progress-row{
    display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted);
    padding:6px 16px; font-family:var(--font-mono);
  }
  .upload-progress-row .spinner{
    width:12px; height:12px; border-radius:50%; border:2px solid var(--line);
    border-top-color:var(--coral); animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ----- Chat pane ----- */
  .chat-pane{
    flex:1;
    display:flex;
    flex-direction:column;
    min-width:0;
    background:var(--paper);
  }
  .chat-empty-state{
    flex:1;
    display:flex; align-items:center; justify-content:center;
    color:var(--muted); font-size:13.5px; text-align:center; padding:20px;
  }
  header.appbar{
    flex:0 0 auto;
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 20px;
    background:var(--paper-2);
    border-bottom:1px solid var(--line);
  }
  .appbar-left{display:flex;align-items:center;gap:10px;min-width:0;}
  .appbar-left .room-name{font-family:var(--font-display);font-size:16px;font-weight:600;}
  .back-btn{display:none;}
  .appbar-actions{display:flex;align-items:center;gap:8px;}
  .call-btn{
    width:38px;height:38px;border-radius:12px;border:none;
    background:var(--teal); color:#fff;
    display:flex;align-items:center;justify-content:center;
    transition:transform .12s ease, background .15s ease;
  }
  .call-btn:hover{background:#26a99d;}
  .call-btn:active{transform:scale(0.94);}

  #messages{
    flex:1 1 auto; overflow-y:auto;
    padding:22px 16px;
    display:flex; flex-direction:column; gap:14px;
  }
  #messages .empty{
    margin:auto; text-align:center; color:var(--muted);
    font-size:13.5px; max-width:260px; line-height:1.6;
  }
  .msg-row{display:flex;align-items:flex-end;gap:8px;max-width:78%;}
  .msg-row.mine{align-self:flex-end;flex-direction:row-reverse;}
  .msg-row img{width:26px;height:26px;border-radius:50%;flex:0 0 auto;margin-bottom:2px;}
  .bubble-wrap{display:flex;flex-direction:column;gap:4px;}
  .msg-row.mine .bubble-wrap{align-items:flex-end;}
  .msg-name{font-size:11.5px;font-weight:600;color:var(--muted);padding:0 4px;}
  .bubble{
    padding:10px 14px;border-radius:16px;font-size:14.5px;line-height:1.5;
    word-break:break-word;white-space:pre-wrap;
  }
  .msg-row:not(.mine) .bubble{background:var(--teal-soft);border-bottom-left-radius:4px;color:var(--ink);}
  .msg-row.mine .bubble{background:var(--coral);color:#fff;border-bottom-right-radius:4px;}
  .msg-row.system{align-self:center;max-width:100%;}
  .msg-row.system .bubble{background:transparent;color:var(--muted);font-size:11.5px;font-family:var(--font-mono);padding:2px 8px;}
  .msg-time{font-family:var(--font-mono);font-size:10px;color:var(--muted);padding:0 4px;}

  form#composer{
    flex:0 0 auto; display:flex; gap:10px;
    padding:14px 16px calc(14px + env(safe-area-inset-bottom));
    background:var(--paper-2); border-top:1px solid var(--line);
  }
  #composer input{
    flex:1; border:1px solid var(--line); background:var(--paper);
    border-radius:14px; padding:12px 16px; font-size:14.5px; color:var(--ink);
    outline:none; transition:border-color .15s ease;
  }
  #composer input:focus{border-color:var(--teal);}
  #composer button{
    flex:0 0 auto; width:46px;height:46px;border-radius:14px;border:none;
    background:var(--chip-dark); color:#fff;
    display:flex;align-items:center;justify-content:center;
    transition:transform .12s ease, background .15s ease;
  }
  #composer button:hover{background:var(--coral);}
  #composer button:active{transform:scale(0.94);}
  #composer button:disabled{opacity:0.4;cursor:not-allowed;}

  /* ----- Modal (room create) ----- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(27,27,47,0.45);
    display:none; align-items:center; justify-content:center; z-index:50;
    padding:20px;
  }
  .modal-overlay.show{display:flex;}
  .modal-card{
    width:min(360px, 100%); background:var(--paper-2); border-radius:18px;
    padding:26px; box-shadow:0 30px 70px -20px rgba(27,27,47,0.35);
  }
  .modal-card h3{font-family:var(--font-display);font-size:17px;margin:0 0 16px;}
  .modal-card input{
    width:100%; border:1px solid var(--line); border-radius:12px; padding:12px 14px;
    font-size:14px; outline:none; margin-bottom:18px;
  }
  .modal-card input:focus{border-color:var(--teal);}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;}
  .modal-actions button{
    padding:10px 16px;border-radius:10px;border:1px solid var(--line);
    font-size:13.5px;font-weight:600;background:var(--paper-2);color:var(--ink);
  }
  .modal-actions .primary{background:var(--chip-dark);color:#fff;border-color:var(--chip-dark);}
  .modal-actions .primary:hover{background:var(--coral);border-color:var(--coral);}
  .modal-actions button:not(.primary):hover{border-color:var(--muted);}

  .visibility-toggle{display:flex;gap:8px;margin-bottom:8px;}
  .vis-opt{
    flex:1; display:flex; align-items:center; justify-content:center; gap:6px;
    padding:10px; border-radius:12px; border:1px solid var(--line);
    background:var(--paper); color:var(--muted); font-size:13px; font-weight:600;
  }
  .vis-opt.active{background:var(--chip-dark); color:#fff; border-color:var(--chip-dark);}
  .visibility-hint{font-size:11.5px; color:var(--muted); margin:0 0 18px;}
  .room-lock{color:var(--muted); flex:0 0 auto; display:flex; align-items:center;}

  .bubble-with-actions{display:flex; align-items:center; gap:6px;}
  .msg-row.mine .bubble-with-actions{flex-direction:row-reverse;}
  .msg-del-btn{
    width:20px; height:20px; border-radius:50%; border:none; background:none;
    color:var(--muted); display:flex; align-items:center; justify-content:center;
    opacity:0; transition:opacity .12s ease; flex:0 0 auto;
  }
  .msg-row:hover .msg-del-btn{opacity:1;}
  .msg-del-btn:hover{color:var(--danger);}
  .bubble.deleted-bubble{
    background:transparent !important; border:1px dashed var(--line); color:var(--muted);
    font-size:13px; font-style:italic;
  }
  .typing-indicator{
    padding:4px 20px; font-size:12px; color:var(--muted); font-style:italic;
  }
  .unread-dot{
    position:absolute; top:-2px; right:-2px; width:11px; height:11px; border-radius:50%;
    background:var(--coral); border:2px solid var(--paper-2);
  }

  /* ----- Call overlays ----- */
  .call-banner, .call-active-bar{
    position:fixed; left:0; right:0; z-index:60;
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 20px; box-shadow:0 10px 30px -10px rgba(27,27,47,0.35);
  }
  .call-banner{
    top:16px; margin:0 auto; width:min(420px, 92vw); left:0; right:0;
    background:var(--chip-dark); color:#fff; border-radius:16px;
    display:none; align-items:center; gap:14px;
  }
  .call-banner.show{display:flex;}
  .call-banner .who{flex:1;min-width:0;}
  .call-banner .who .t1{font-size:11px;color:#B9BAD6;font-family:var(--font-mono);}
  .call-banner .who .t2{font-size:14.5px;font-weight:600;}
  .call-banner button{
    width:38px;height:38px;border-radius:50%;border:none;
    display:flex;align-items:center;justify-content:center;color:#fff;
  }
  .call-banner .accept{background:var(--teal);}
  .call-banner .decline{background:var(--danger);}

  .call-active-bar{
    bottom:0; background:var(--chip-dark); color:#fff;
    display:none; align-items:center; gap:14px;
  }
  .call-active-bar.show{display:flex;}
  .call-active-bar .who{flex:1;font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:8px;}
  .call-active-bar .dot{width:8px;height:8px;border-radius:50%;background:var(--teal);animation:pulse 1.4s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
  .call-active-bar .timer{font-family:var(--font-mono);font-size:12px;color:#B9BAD6;}
  .call-participants{display:flex;align-items:center;}
  .call-participants .p-avatar{
    width:26px;height:26px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg, var(--teal), var(--coral));
    color:#fff;font-size:11px;font-weight:700;font-family:var(--font-display);
    border:2px solid var(--chip-dark);
    margin-left:-8px;
  }
  .call-participants .p-avatar:first-child{margin-left:0;}
  .call-active-bar .hangup{
    width:38px;height:38px;border-radius:50%;border:none;background:var(--danger);color:#fff;
    display:flex;align-items:center;justify-content:center;
  }

  /* ---------- Mobile ---------- */
  @media (max-width:820px){
    .sidebar, .sidebar.collapsed{
      position:fixed; inset:0; width:100%; flex:none; z-index:5;
      transform:translateX(0); transition:transform .2s ease;
    }
    .sidebar.collapsed .sidebar-top{display:flex;}
    .sidebar.collapsed #room-list{display:none;}
    .chat-pane{
      position:fixed; inset:0; z-index:6;
      transform:translateX(100%); transition:transform .2s ease;
    }
    .shell.show-chat .sidebar{transform:translateX(-100%);}
    .shell.show-chat .chat-pane{transform:translateX(0);}
    .back-btn{display:flex;}
    .msg-row{max-width:88%;}
  }

  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px;}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-card">
    <div class="mark">
      <svg width="96" height="96" viewBox="0 0 34 34" xmlns="http://www.w3.org/2000/svg" style="display:block;">
        <circle cx="14" cy="17" r="12" fill="#2EC4B6"/>
        <circle cx="22" cy="14" r="10" fill="#FF6F59" fill-opacity="0.92"/>
      </svg>
      <span class="wordmark">Duochat</span>
    </div>
    <h1>둘이 나누는 대화</h1>
    <p>구글 계정으로 로그인하고<br/>채팅방을 만들어 대화를 시작하세요.</p>
    <button class="google-btn" id="google-signin-btn">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l6-6C34 5.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.5z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.8 18.9 13 24 13c3.1 0 5.8 1.1 8 3l6-6C34 5.5 29.3 4 24 4c-7.7 0-14.3 4.3-17.7 10.7z"/>
        <path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5.1l-6.2-5.2C29.2 35.4 26.7 36 24 36c-5.3 0-9.6-3.1-11.3-7.5l-6.5 5C9.6 39.6 16.2 44 24 44z"/>
        <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.2 4.3-4.1 5.7l6.2 5.2C41.3 35.9 44 30.4 44 24c0-1.3-.1-2.7-.4-3.5z"/>
      </svg>
      Google로 계속하기
    </button>
    <p id="login-error"></p>
    <div class="login-foot">Firebase Auth · Firestore · WebRTC</div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="app-screen">
  <div class="shell" id="shell">
    <!-- Sidebar : room list -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <svg width="26" height="26" viewBox="0 0 34 34" xmlns="http://www.w3.org/2000/svg" style="display:block;">
        <circle cx="14" cy="17" r="12" fill="#2EC4B6"/>
        <circle cx="22" cy="14" r="10" fill="#FF6F59" fill-opacity="0.92"/>
      </svg>
        <span>Duochat</span>
      </div>
      <div class="sidebar-top">
        <div class="my-mini">
          <img id="my-avatar" src="" alt="" />
          <div>
            <div class="name" id="my-name"></div>
            <button class="signout-mini" id="signout-btn">로그아웃</button>
          </div>
        </div>
        <div style="display:flex;gap:6px;">
          <button class="icon-btn" id="edit-profile-btn" title="프로필 설정">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z" stroke="currentColor" stroke-width="2"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 110 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" stroke-width="1.6"/></svg>
          </button>
          <button class="icon-btn" id="new-room-btn" title="채팅방 만들기">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
          <button class="icon-btn" id="theme-toggle-btn" title="다크 모드">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" id="theme-icon"><path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>

      <div class="tab-bar" id="tab-bar">
        <button class="tab-btn active" data-tab="chats">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>채팅</span>
        </button>
        <button class="tab-btn" data-tab="friends">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="1.8"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>친구</span>
        </button>
        <button class="tab-btn" data-tab="moments">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="16" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M3 15l5-5 4 4 3-3 6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="8" cy="9" r="1.3" fill="currentColor"/></svg>
          <span>모먼트</span>
        </button>
      </div>

      <!-- 채팅 목록 -->
      <div id="room-list" class="tab-panel">
        <div class="empty">아직 채팅방이 없어요.<br/>오른쪽 위 + 버튼으로 새 방을 만들어보세요.</div>
      </div>
    </aside>

    <!-- Chat pane -->
    <section class="chat-pane" id="chat-pane">
      <div class="chat-empty-state" id="chat-empty-state">채팅방을 선택하거나 새로 만들어보세요.</div>

      <div id="friends-view" style="display:none; flex-direction:column; height:100%;">
        <header class="appbar">
          <div class="appbar-left">
            <button class="icon-btn back-btn" id="friends-back-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <span class="room-name">친구</span>
          </div>
        </header>
        <div class="friends-view-body">
          <div class="friend-search">
            <input id="friend-search-input" type="text" placeholder="닉네임으로 친구 찾기" maxlength="20" />
            <button id="friend-search-btn" class="icon-btn" title="검색">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
          </div>
          <div id="friend-search-section" style="display:none;">
            <div class="friend-list-title">검색 결과</div>
            <div id="friend-search-results"></div>
          </div>
          <div class="friend-list-title">내 친구</div>
          <div id="friend-list">
            <div class="empty">아직 친구가 없어요.<br/>위에서 닉네임으로 검색해보세요.</div>
          </div>
        </div>
      </div>

      <div id="moments-view" style="display:none; flex-direction:column; height:100%;">
        <header class="appbar">
          <div class="appbar-left">
            <button class="icon-btn back-btn" id="moments-back-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <span class="room-name">모먼트</span>
          </div>
        </header>
        <div id="moments-feed" style="flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;">
          <div class="moment-composer">
            <textarea id="moment-input" placeholder="무슨 생각을 하고 있나요?" maxlength="300"></textarea>
            <button id="moment-post-btn" class="modal-actions primary" style="align-self:flex-end;padding:8px 16px;border-radius:10px;border:none;font-size:13px;font-weight:600;">올리기</button>
          </div>
          <div id="moments-list"></div>
        </div>
      </div>

      <div id="chat-active" style="display:none; flex-direction:column; height:100%;">
        <header class="appbar">
          <div class="appbar-left">
            <button class="icon-btn back-btn" id="back-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <span class="room-name" id="active-room-name"></span>
          </div>
          <div class="appbar-actions">
            <button class="icon-btn" id="invite-btn" title="친구 초대">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="1.8"/><path d="M19 8v6M22 11h-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            </button>
            <button class="call-btn" id="call-start-btn" title="음성통화">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C11 21 3 13 3 4c0-.6.4-1 1-1h3.2c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.6.1.4 0 .8-.2 1L6.6 10.8z" fill="currentColor"/></svg>
            </button>
            <button class="icon-btn" id="delete-room-btn" title="채팅방 삭제">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 7h16M9 7V5a1 1 0 011-1h4a1 1 0 011 1v2m-8 0v12a1 1 0 001 1h6a1 1 0 001-1V7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
        </header>

        <div id="messages"></div>

        <div id="typing-indicator" class="typing-indicator" style="display:none;"></div>
        <div id="sticker-panel" style="display:none;"></div>
        <form id="composer" autocomplete="off">
          <button type="button" class="icon-btn" id="image-btn" title="사진 보내기">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.8"/><circle cx="8.5" cy="10" r="1.5" fill="currentColor"/><path d="M21 16l-5.5-5.5a2 2 0 00-2.8 0L4 19" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <input id="image-file-input" type="file" accept="image/*" style="display:none;" />
          <button type="button" class="icon-btn" id="emoji-toggle-btn" title="이모티콘">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><path d="M8.5 14s1.5 2 3.5 2 3.5-2 3.5-2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="9" cy="9.5" r="1.1" fill="currentColor"/><circle cx="15" cy="9.5" r="1.1" fill="currentColor"/></svg>
          </button>
          <input id="msg-input" type="text" placeholder="메시지를 입력하세요" maxlength="1000" />
          <button type="submit" id="send-btn" aria-label="보내기">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 20L20 12L4 4V10.5L14 12L4 13.5V20Z" fill="currentColor"/></svg>
          </button>
        </form>
      </div>
    </section>
  </div>
</div>

<!-- 새 방 만들기 모달 -->
<div class="modal-overlay" id="new-room-modal">
  <div class="modal-card">
    <h3>새 채팅방 만들기</h3>
    <input id="new-room-input" type="text" placeholder="채팅방 이름" maxlength="40" />
    <div class="visibility-toggle" id="new-room-visibility">
      <button type="button" class="vis-opt active" data-vis="public">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><path d="M3 12h18M12 3c2.5 2.5 4 5.7 4 9s-1.5 6.5-4 9c-2.5-2.5-4-5.7-4-9s1.5-6.5 4-9z" stroke="currentColor" stroke-width="1.8"/></svg>
        <span>공개</span>
      </button>
      <button type="button" class="vis-opt" data-vis="private">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="5" y="11" width="14" height="9" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M8 11V8a4 4 0 018 0v3" stroke="currentColor" stroke-width="1.8"/></svg>
        <span>비공개</span>
      </button>
    </div>
    <p class="visibility-hint" id="new-room-visibility-hint">누구나 목록에서 보고 들어올 수 있어요.</p>
    <div class="modal-actions">
      <button id="new-room-cancel">취소</button>
      <button class="primary" id="new-room-confirm">만들기</button>
    </div>
  </div>
</div>

<!-- 프로필 설정 모달 -->
<div class="modal-overlay" id="profile-modal">
  <div class="modal-card">
    <h3>프로필 설정</h3>
    <label style="display:block;font-size:12px;color:var(--muted);margin-bottom:6px;">닉네임 (구글 이름 대신 표시돼요)</label>
    <input id="profile-nickname-input" type="text" placeholder="닉네임" maxlength="20" />
    <label style="display:block;font-size:12px;color:var(--muted);margin-bottom:6px;">전화번호 (선택)</label>
    <input id="profile-phone-input" type="tel" placeholder="예) 010-1234-5678" maxlength="20" />
    <div class="modal-actions">
      <button id="profile-cancel">취소</button>
      <button class="primary" id="profile-confirm">저장</button>
    </div>
  </div>
</div>

<!-- 친구 초대 모달 -->
<div class="modal-overlay" id="invite-modal">
  <div class="modal-card">
    <h3>친구 초대</h3>
    <div id="invite-list" style="max-height:320px;overflow-y:auto;margin-bottom:16px;"></div>
    <div class="modal-actions">
      <button id="invite-close">닫기</button>
    </div>
  </div>
</div>

<!-- 프로필 보기 모달 -->
<div class="modal-overlay" id="view-profile-modal">
  <div class="modal-card" style="text-align:center;">
    <img id="vp-avatar" src="" alt="" style="width:76px;height:76px;border-radius:50%;margin:0 auto 14px;display:block;box-shadow:0 0 0 3px var(--paper);" />
    <h3 id="vp-nickname" style="margin-bottom:4px;"></h3>
    <p id="vp-sub" style="font-size:12px;color:var(--muted);margin:0 0 16px;"></p>
    <div style="display:flex;justify-content:center;gap:28px;margin-bottom:20px;">
      <div><div id="vp-following-count" style="font-size:18px;font-weight:700;font-family:var(--font-display);">0</div><div style="font-size:11.5px;color:var(--muted);">팔로잉</div></div>
      <div><div id="vp-follower-count" style="font-size:18px;font-weight:700;font-family:var(--font-display);">0</div><div style="font-size:11.5px;color:var(--muted);">팔로워</div></div>
    </div>
    <div class="modal-actions" id="vp-actions" style="justify-content:center;"></div>
  </div>
</div>

<!-- 수신 전화 배너 -->
<div class="call-banner" id="call-banner">
  <div class="who">
    <div class="t1">음성통화 참여 요청</div>
    <div class="t2" id="call-banner-name"></div>
  </div>
  <button class="decline" id="call-decline-btn" title="거절">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
  </button>
  <button class="accept" id="call-accept-btn" title="참여">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C11 21 3 13 3 4c0-.6.4-1 1-1h3.2c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.6.1.4 0 .8-.2 1L6.6 10.8z" fill="#fff"/></svg>
  </button>
</div>

<!-- 통화 중 하단바 -->
<div class="call-active-bar" id="call-active-bar">
  <div class="who"><span class="dot"></span><span id="call-active-name">통화 중</span></div>
  <div class="call-participants" id="call-participants"></div>
  <span class="timer" id="call-timer">00:00</span>
  <button class="hangup" id="call-hangup-btn" title="나가기">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="transform:rotate(135deg)"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C11 21 3 13 3 4c0-.6.4-1 1-1h3.2c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.6.1.4 0 .8-.2 1L6.6 10.8z" fill="#fff"/></svg>
  </button>
</div>

  /* ---------- Dark mode ---------- */
  function applyThemeIcon() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    themeIcon.innerHTML = isDark
      ? '<circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="1.8"/><path d="M12 2v2M12 20v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2 12h2M20 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>'
      : '<path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>';
  }
  applyThemeIcon();
  themeToggleBtn.addEventListener('click', () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    if (isDark) {
      document.documentElement.removeAttribute('data-theme');
      try { localStorage.setItem('duochat-theme', 'light'); } catch (e) {}
    } else {
      document.documentElement.setAttribute('data-theme', 'dark');
      try { localStorage.setItem('duochat-theme', 'dark'); } catch (e) {}
    }
    applyThemeIcon();
  });

  /* ---------- State ---------- */
  let currentUser = null;
  let myProfile = { nickname: '', phone: '' };
  let rooms = [];
  let activeRoomId = null;
  let activeRoomData = null;
  let unsubRooms = null;
  let unsubMessages = null;

  const handledCallIds = new Set();

  /* ---------- Auth ---------- */
  googleBtn.addEventListener('click', async () => {
    loginError.style.display = 'none';
    googleBtn.disabled = true;
    try { await signInWithPopup(auth, provider); }
    catch (err) {
      console.error(err);
      loginError.textContent = '로그인에 실패했어요. 다시 시도해주세요.';
      loginError.style.display = 'block';
    } finally { googleBtn.disabled = false; }
  });

  signoutBtn.addEventListener('click', () => signOut(auth));

  onAuthStateChanged(auth, async (user) => {
    currentUser = user;
    if (user) {
      loginScreen.style.display = 'none';
      appScreen.style.display = 'block';
      myAvatar.src = user.photoURL || '';
      myName.textContent = user.displayName || '사용자';
      await loadOrCreateProfile(user);
      listenRooms();
      listenFriends();
    } else {
      appScreen.style.display = 'none';
      loginScreen.style.display = 'flex';
      cleanupRoomView();
      if (unsubPublicRooms) { unsubPublicRooms(); unsubPublicRooms = null; }
      if (unsubMyRooms) { unsubMyRooms(); unsubMyRooms = null; }
      publicRoomsCache = {}; myRoomsCache = {};
      if (unsubFriends) { unsubFriends(); unsubFriends = null; }
      if (unsubMoments) { unsubMoments(); unsubMoments = null; }
      momentsLoaded = false;
      teardownCall();
      rooms = []; activeRoomId = null;
      myProfile = { nickname: '', phone: '' };
      myLastReadMap = {};
    }
  });

  async function loadOrCreateProfile(user) {
    const ref = doc(db, 'users', user.uid);
    try {
      const snap = await getDoc(ref);
      if (snap.exists()) {
        const data = snap.data();
        myProfile = { nickname: data.nickname || user.displayName || '사용자', phone: data.phone || '' };
        myLastReadMap = data.lastReadMap || {};
      } else {
        myProfile = { nickname: user.displayName || '사용자', phone: '' };
        await setDoc(ref, {
          nickname: myProfile.nickname,
          nicknameLower: myProfile.nickname.toLowerCase(),
          phone: '',
          email: user.email || '',
          createdAt: serverTimestamp()
        });
      }
    } catch (err) {
      console.error(err);
      myProfile = { nickname: user.displayName || '사용자', phone: '' };
    }
    myName.textContent = myProfile.nickname;
  }

  editProfileBtn.addEventListener('click', () => {
    profileNicknameInput.value = myProfile.nickname || '';
    profilePhoneInput.value = myProfile.phone || '';
    profileModal.classList.add('show');
    setTimeout(() => profileNicknameInput.focus(), 50);
  });
  profileCancel.addEventListener('click', () => profileModal.classList.remove('show'));
  profileModal.addEventListener('click', (e) => { if (e.target === profileModal) profileModal.classList.remove('show'); });

  profileConfirm.addEventListener('click', async () => {
    const nickname = profileNicknameInput.value.trim();
    const phone = profilePhoneInput.value.trim();
    if (!nickname) { alert('닉네임을 입력해주세요.'); return; }
    if (!currentUser) return;
    profileConfirm.disabled = true;
    try {
      await setDoc(doc(db, 'users', currentUser.uid), {
        nickname, nicknameLower: nickname.toLowerCase(), phone,
        email: currentUser.email || '',
        updatedAt: serverTimestamp()
      }, { merge: true });
      myProfile = { nickname, phone };
      myName.textContent = nickname;
      profileModal.classList.remove('show');
    } catch (err) {
      console.error(err);
      alert('프로필 저장에 실패했어요.');
    } finally { profileConfirm.disabled = false; }
  });

  /* ---------- Room list ----------
     공개방(visibility != 'private')과 내가 멤버로 속한 방(비공개 그룹방 + 모든 DM)을
     각각 구독해서 합친 뒤 목록을 그린다. */
  let publicRoomsCache = {};
  let myRoomsCache = {};
  let unsubPublicRooms = null;
  let unsubMyRooms = null;

  function listenRooms() {
    const qPublic = query(collection(db, 'rooms'), where('visibility', '!=', 'private'), limit(100));
    unsubPublicRooms = onSnapshot(qPublic, (snap) => {
      publicRoomsCache = {};
      snap.forEach(d => publicRoomsCache[d.id] = { id: d.id, ...d.data() });
      mergeAndRenderRooms();
    });

    const qMine = query(collection(db, 'rooms'), where('members', 'array-contains', currentUser.uid), limit(100));
    unsubMyRooms = onSnapshot(qMine, (snap) => {
      myRoomsCache = {};
      snap.forEach(d => myRoomsCache[d.id] = { id: d.id, ...d.data() });
      mergeAndRenderRooms();
    });
  }

  function mergeAndRenderRooms() {
    const merged = { ...publicRoomsCache, ...myRoomsCache };
    rooms = Object.values(merged).sort((a, b) => {
      const ta = a.lastMessageAt && a.lastMessageAt.toMillis ? a.lastMessageAt.toMillis() : 0;
      const tb = b.lastMessageAt && b.lastMessageAt.toMillis ? b.lastMessageAt.toMillis() : 0;
      return tb - ta;
    });
    renderRoomList();
    if (activeRoomId) {
      activeRoomData = rooms.find(r => r.id === activeRoomId) || null;
      if (activeRoomData) {
        activeRoomName.textContent = displayNameForRoom(activeRoomData);
        inviteBtn.style.display = activeRoomData.type === 'dm' ? 'none' : 'flex';
      }
    }
  }

  function displayNameForRoom(room) {
    if (room.type === 'dm' && room.memberInfo && currentUser) {
      const otherUid = (room.members || []).find(u => u !== currentUser.uid);
      const other = otherUid && room.memberInfo[otherUid];
      if (other) return other.nickname || '(알수없음)';
    }
    return room.name || '(이름없음)';
  }

  function canDeleteRoom(room) {
    if (!currentUser) return false;
    if (room.type === 'dm') return (room.members || []).includes(currentUser.uid);
    return room.createdBy === currentUser.uid;
  }

  function renderRoomList() {
    if (rooms.length === 0) {
      roomListEl.innerHTML = '<div class="empty">아직 채팅방이 없어요.<br/>오른쪽 위 + 버튼으로 새 방을 만들어보세요.</div>';
      return;
    }
    roomListEl.innerHTML = '';
    rooms.forEach(room => {
      const item = document.createElement('div');
      item.className = 'room-item' + (room.id === activeRoomId ? ' active' : '');
      const displayName = displayNameForRoom(room);

      const avatar = document.createElement('div');
      avatar.className = 'room-avatar';
      avatar.style.position = 'relative';
      if (room.type === 'dm') avatar.style.background = 'linear-gradient(135deg, var(--coral), var(--teal))';
      avatar.textContent = (displayName || '?').trim().charAt(0).toUpperCase();
      if (isRoomUnread(room)) {
        const dot = document.createElement('span');
        dot.className = 'unread-dot';
        avatar.appendChild(dot);
      }

      const info = document.createElement('div');
      info.className = 'room-info';
      const row = document.createElement('div');
      row.className = 'room-name-row';
      const nameEl = document.createElement('div');
      nameEl.className = 'room-name';
      nameEl.textContent = displayName;
      if (room.type !== 'dm' && room.visibility === 'private') {
        const lock = document.createElement('span');
        lock.className = 'room-lock';
        lock.title = '비공개 채팅방';
        lock.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none"><rect x="5" y="11" width="14" height="9" rx="2" stroke="currentColor" stroke-width="2"/><path d="M8 11V8a4 4 0 018 0v3" stroke="currentColor" stroke-width="2"/></svg>';
        nameEl.prepend(lock);
        nameEl.style.display = 'flex';
        nameEl.style.alignItems = 'center';
        nameEl.style.gap = '4px';
      }
      const timeEl = document.createElement('div');
      timeEl.className = 'room-time';
      timeEl.textContent = formatShortTime(room.lastMessageAt);
      row.appendChild(nameEl); row.appendChild(timeEl);
      const lastEl = document.createElement('div');
      lastEl.className = 'room-last';
      lastEl.textContent = room.lastMessage || '메시지가 없습니다';
      info.appendChild(row); info.appendChild(lastEl);

      item.appendChild(avatar);
      item.appendChild(info);

      if (canDeleteRoom(room)) {
        const delBtn = document.createElement('button');
        delBtn.className = 'room-del';
        delBtn.title = '방 삭제';
        delBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>';
        delBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteRoom(room); });
        item.appendChild(delBtn);
      }

      item.addEventListener('click', () => openRoom(room.id));
      roomListEl.appendChild(item);
    });
  }

  function formatShortTime(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    const now = new Date();
    const sameDay = d.toDateString() === now.toDateString();
    return sameDay
      ? d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })
      : d.toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' });
  }

  /* ---------- Create / delete room ---------- */
  newRoomBtn.addEventListener('click', () => {
    newRoomInput.value = '';
    newRoomVisValue = 'public';
    [...newRoomVisibility.querySelectorAll('.vis-opt')].forEach(b => b.classList.toggle('active', b.dataset.vis === 'public'));
    newRoomVisibilityHint.textContent = '누구나 목록에서 보고 들어올 수 있어요.';
    newRoomModal.classList.add('show');
    setTimeout(() => newRoomInput.focus(), 50);
  });
  newRoomVisibility.addEventListener('click', (e) => {
    const btn = e.target.closest('.vis-opt');
    if (!btn) return;
    newRoomVisValue = btn.dataset.vis;
    [...newRoomVisibility.querySelectorAll('.vis-opt')].forEach(b => b.classList.toggle('active', b === btn));
    newRoomVisibilityHint.textContent = newRoomVisValue === 'private'
      ? '초대한 친구만 보고 들어올 수 있어요.'
      : '누구나 목록에서 보고 들어올 수 있어요.';
  });
  newRoomCancel.addEventListener('click', () => newRoomModal.classList.remove('show'));
  newRoomModal.addEventListener('click', (e) => { if (e.target === newRoomModal) newRoomModal.classList.remove('show'); });
  newRoomInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') newRoomConfirm.click(); });

  newRoomConfirm.addEventListener('click', async () => {
    const name = newRoomInput.value.trim();
    if (!name || !currentUser) return;
    newRoomConfirm.disabled = true;
    try {
      const ref = await addDoc(collection(db, 'rooms'), {
        name,
        type: 'group',
        visibility: newRoomVisValue,
        members: [currentUser.uid],
        createdBy: currentUser.uid,
        createdByName: myProfile.nickname || currentUser.displayName || '익명',
        createdAt: serverTimestamp(),
        lastMessage: '채팅방이 생성되었습니다.',
        lastMessageAt: serverTimestamp()
      });
      newRoomModal.classList.remove('show');
      openRoom(ref.id);
    } catch (err) {
      console.error(err);
      alert('방 생성에 실패했어요.');
    } finally { newRoomConfirm.disabled = false; }
  });

  async function deleteRoom(room) {
    if (!confirm(`'${room.name}' 채팅방을 삭제할까요?\n모든 메시지가 함께 삭제됩니다.`)) return;
    try {
      const msgsSnap = await getDocs(collection(db, 'rooms', room.id, 'messages'));
      const batch = writeBatch(db);
      msgsSnap.forEach(d => batch.delete(d.ref));
      batch.delete(doc(db, 'rooms', room.id));
      await batch.commit();
      if (activeRoomId === room.id) closeRoom();
    } catch (err) {
      console.error(err);
      alert('방 삭제에 실패했어요.');
    }
  }

  deleteRoomBtn.addEventListener('click', () => {
    if (!activeRoomData) return;
    if (!canDeleteRoom(activeRoomData)) {
      alert('이 방을 삭제할 권한이 없어요.');
      return;
    }
    deleteRoom(activeRoomData);
  });

  /* ---------- Open / close room ---------- */
  function openRoom(roomId) {
    if (activeRoomId === roomId) { shell.classList.add('show-chat'); return; }
    if (unsubMessages) { unsubMessages(); unsubMessages = null; }
    stopWatchingTyping();
    teardownCall();

    activeRoomId = roomId;
    activeRoomData = rooms.find(r => r.id === roomId) || null;
    chatEmptyState.style.display = 'none';
    chatActive.style.display = 'flex';
    activeRoomName.textContent = activeRoomData ? displayNameForRoom(activeRoomData) : '';
    inviteBtn.style.display = (activeRoomData && activeRoomData.type === 'dm') ? 'none' : 'flex';
    shell.classList.add('show-chat');
    renderRoomList();
    markRoomRead(roomId);
    watchTyping(roomId);

    const q = query(collection(db, 'rooms', roomId, 'messages'), orderBy('createdAt', 'asc'), limit(300));
    unsubMessages = onSnapshot(q, (snap) => {
      const docs = [];
      snap.forEach(d => docs.push({ id: d.id, ...d.data() }));
      renderMessages(docs);
      markRoomRead(roomId);
    });
  }

  function closeRoom() {
    if (unsubMessages) { unsubMessages(); unsubMessages = null; }
    stopWatchingTyping();
    teardownCall();
    activeRoomId = null;
    activeRoomData = null;
    chatActive.style.display = 'none';
    chatEmptyState.style.display = 'flex';
    shell.classList.remove('show-chat');
    renderRoomList();
  }

  function cleanupRoomView() {
    if (unsubMessages) { unsubMessages(); unsubMessages = null; }
    stopWatchingTyping();
    activeRoomId = null; activeRoomData = null;
    chatActive.style.display = 'none';
    chatEmptyState.style.display = 'flex';
    shell.classList.remove('show-chat');
  }

  backBtn.addEventListener('click', () => { shell.classList.remove('show-chat'); });
  const momentsBackBtn = document.getElementById('moments-back-btn');
  momentsBackBtn.addEventListener('click', () => { shell.classList.remove('show-chat'); });

  /* ---------- Messages ---------- */
  function formatTime(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  }

  function renderMessages(docs) {
    if (docs.length === 0) {
      messagesEl.innerHTML = '<div class="empty">아직 메시지가 없어요.<br/>첫 메시지를 남겨보세요.</div>';
      return;
    }
    const wasNearBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 120;
    messagesEl.innerHTML = '';
    docs.forEach((data) => {
      if (data.type === 'system') {
        const row = document.createElement('div');
        row.className = 'msg-row system';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = data.text || '';
        row.appendChild(bubble);
        messagesEl.appendChild(row);
        return;
      }

      const mine = currentUser && data.uid === currentUser.uid;
      const row = document.createElement('div');
      row.className = 'msg-row' + (mine ? ' mine' : '');

      const img = document.createElement('img');
      img.src = data.photoURL || '';
      img.alt = '';
      row.appendChild(img);

      const wrap = document.createElement('div');
      wrap.className = 'bubble-wrap';
      if (!mine) {
        const nameEl = document.createElement('div');
        nameEl.className = 'msg-name';
        nameEl.textContent = data.displayName || '익명';
        wrap.appendChild(nameEl);
      }
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      if (data.deleted) {
        bubble.className = 'bubble deleted-bubble';
        bubble.textContent = '삭제된 메시지예요';
      } else if (data.type === 'sticker') {
        bubble.className = 'bubble sticker-bubble';
        bubble.innerHTML = stickerSvgById(data.stickerId);
      } else if (data.type === 'big-emoji') {
        bubble.className = 'bubble big-emoji';
        bubble.textContent = data.text || '';
      } else if (data.type === 'image') {
        bubble.className = 'bubble image-bubble';
        const imgEl = document.createElement('img');
        imgEl.src = data.imageData || data.imageUrl || '';
        imgEl.loading = 'lazy';
        imgEl.alt = '이미지';
        bubble.appendChild(imgEl);
        bubble.addEventListener('click', () => openLightbox(data.imageData || data.imageUrl));
      } else {
        bubble.textContent = data.text || '';
      }

      if (mine && !data.deleted) {
        const bubbleRow = document.createElement('div');
        bubbleRow.className = 'bubble-with-actions';
        const delBtn = document.createElement('button');
        delBtn.className = 'msg-del-btn';
        delBtn.title = '삭제';

  function stopTyping() {
    if (!typingActive || !activeRoomId || !currentUser) { typingActive = false; return; }
    typingActive = false;
    clearTimeout(typingTimeout);
    deleteDoc(typingDocRef(activeRoomId)).catch(() => {});

  function watchTyping(roomId) {
    unsubTyping = onSnapshot(collection(db, 'rooms', roomId, 'typing'), (snap) => {
      const now = Date.now();
      const names = [];
      snap.forEach((d) => {
        if (d.id === currentUser.uid) return;
        const data = d.data();
        const t = data.updatedAt && data.updatedAt.toMillis ? data.updatedAt.toMillis() : 0;
        if (now - t < 5000) names.push(data.nickname || '누군가');
      });
      if (names.length === 0) {
        typingIndicatorEl.style.display = 'none';
      } else if (names.length === 1) {
        typingIndicatorEl.textContent = `${names[0]}님이 입력 중…`;
        typingIndicatorEl.style.display = 'block';
      } else {
        typingIndicatorEl.textContent = `${names[0]}님 외 ${names.length - 1}명이 입력 중…`;
        typingIndicatorEl.style.display = 'block';
      }
    });
  }

  function stopWatchingTyping() {
    if (unsubTyping) { unsubTyping(); unsubTyping = null; }
    typingIndicatorEl.style.display = 'none';
    typingIndicatorEl.textContent = '';
    stopTyping();
  }

     ========================================================= */
  let myLastReadMap = {};

  function markRoomRead(roomId) {
    if (!currentUser || !roomId) return;
    myLastReadMap[roomId] = Date.now();
    renderRoomList();
    updateDoc(doc(db, 'users', currentUser.uid), {
      [`lastReadMap.${roomId}`]: serverTimestamp()
    }).catch(() => {});

  function isRoomUnread(room) {
    if (!room || room.id === activeRoomId) return false;
    if (!room.lastMessageAt || !room.lastMessageAt.toMillis) return false;
    const lastMsgMs = room.lastMessageAt.toMillis();
    const lastReadRaw = myLastReadMap[room.id];
    const lastReadMs = typeof lastReadRaw === 'number' ? lastReadRaw
      : (lastReadRaw && lastReadRaw.toMillis ? lastReadRaw.toMillis() : 0);
    return lastMsgMs > lastReadMs;
  }

  async function startDm(otherUid, otherNickname, otherPhotoURL) {
    if (!currentUser) return;
    const dmId = 'dm_' + [currentUser.uid, otherUid].sort().join('_');
    const ref = doc(db, 'rooms', dmId);
    try {
      const snap = await getDoc(ref);
      if (!snap.exists()) {
        const memberInfo = {};
        memberInfo[currentUser.uid] = { nickname: myProfile.nickname || currentUser.displayName || '익명', photoURL: currentUser.photoURL || '' };
        memberInfo[otherUid] = { nickname: otherNickname || '익명', photoURL: otherPhotoURL || '' };
        await setDoc(ref, {
          type: 'dm',
          visibility: 'private',
          name: otherNickname || '1:1 채팅',
          members: [currentUser.uid, otherUid],
          memberInfo,
          createdBy: currentUser.uid,
          createdAt: serverTimestamp(),

    vpAvatar.src = '';

    try {
      const isMe = uid === currentUser.uid;
      const userSnap = await getDoc(doc(db, 'users', uid));
      const data = userSnap.exists() ? userSnap.data() : {};
      const nickname = data.nickname || (isMe ? (myProfile.nickname || '나') : '(알수없음)');
      vpNickname.textContent = nickname;
      vpSub.textContent = isMe ? '나의 프로필' : '';
      vpAvatar.src = (isMe ? currentUser.photoURL : data.photoURL) || '';

      const [followingSnap, followerSnap] = await Promise.all([
        getCountFromServer(collection(db, 'users', uid, 'friends')),
        getCountFromServer(query(collectionGroup(db, 'friends'), where('friendUid', '==', uid)))
      ]);
      vpFollowingCount.textContent = followingSnap.data().count;
      vpFollowerCount.textContent = followerSnap.data().count;

      vpActions.innerHTML = '';
      if (isMe) {
        const editBtn = document.createElement('button');

        editBtn.addEventListener('click', () => {
          viewProfileModal.classList.remove('show');
          editProfileBtn.click();

        vpActions.appendChild(editBtn);
      } else {
        const already = !!myFriends[uid];
        const addBtn = document.createElement('button');
        addBtn.className = already ? '' : 'primary';
        addBtn.textContent = already ? '이미 친구' : '친구 추가';
        addBtn.disabled = already;
        addBtn.addEventListener('click', async () => {
          addBtn.disabled = true;
          try {
            await setDoc(doc(db, 'users', currentUser.uid, 'friends', uid), {
              friendUid: uid,
              nickname: data.nickname || '익명',
              photoURL: data.photoURL || '',
              addedAt: serverTimestamp()
            });
            addBtn.textContent = '이미 친구';
